<!DOCTYPE html>
<html>
<head>
  <title>Abbas QR Pro</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>

<body style="text-align:center; font-family:Arial; background:#f4f6f8; padding:40px;">

  <h1 style="color:#2c3e50;">Abbas QR Generator Pro</h1>

  <p>Enter anything (Link, Text, Phone, PDF link)</p>

  <input type="text" id="data" placeholder="Enter your data"
    style="padding:10px; width:300px; border-radius:5px; border:1px solid #ccc;" />

  <br><br>

  <button onclick="generateQR()"
    style="padding:12px 25px; background:#27ae60; color:white; border:none; border-radius:5px;">
    Generate QR
  </button>

  <br><br>

  <div id="qrcode"></div>

  <script>
    function generateQR() {
      var data = document.getElementById("data").value;

      document.getElementById("qrcode").innerHTML = "";

      new QRCode(document.getElementById("qrcode"), {
        text: data,
        width: 200,
        height: 200
      });
    }
  </script>

</body>
</html>
