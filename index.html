<!DOCTYPE html>
<html>
<head>
  <title>AbbasQR Generator</title>
</head>
<body style="text-align:center; font-family:sans-serif;">

<h1>AbbasQR Code Generator</h1>

<input type="text" id="text" placeholder="Enter your link" style="width:250px; padding:10px;">
<br><br>

<button onclick="generateQR()" style="padding:10px 20px;">Generate QR</button>

<br><br>
<img id="qr" />

<script>
function generateQR() {
  var text = document.getElementById("text").value;
  if(text === "") {
    alert("Please enter a link");
    return;
  }
  document.getElementById("qr").src =
    "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + encodeURIComponent(text);
}
</script>

</body>
</html>
